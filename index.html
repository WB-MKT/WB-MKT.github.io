<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>YouTube Live 嵌入示例</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    max-width: 1200px;
    width: 100%;
    gap: 20px;
  }

  /* 视频区域占比大 */
  .video {
    flex: 3 1 0; /* 视频占比 3/4 */
    min-width: 400px;
  }

  /* 聊天区域占比小 */
  .chat {
    flex: 1 1 0; /* 聊天占比 1/4 */
    min-width: 200px;
    max-width: 300px;
  }

  iframe {
    width: 100%;
    height: 450px;
    border: 0;
  }

  /* 移动端自适应 */
  @media (max-width: 800px) {
    .container {
      flex-direction: column;
    }

    iframe {
      height: 300px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 视频 iframe -->
  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/RQYzsYBYZt4"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Chat iframe -->
  <div class="chat">
    <iframe
      src="https://www.youtube.com/live_chat?v=RQYzsYBYZt4&embed_domain=wb-mkt.github.io"
      allowfullscreen>
    </iframe>
  </div>
</div>

</body>
</html>
