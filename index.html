<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>YouTube Live 嵌入示例</title>
<style>
  body { margin: 0; padding: 20px; display: flex; justify-content: center; font-family: sans-serif; }
  .container { display: flex; flex-wrap: wrap; max-width: 1200px; width: 100%; gap: 20px; }
  .video { flex: 1 1 800px; }
  iframe { width: 100%; height: 450px; border: 0; }
</style>
</head>
<body>

<div class="container">
  <!-- 视频 iframe，直播未开始也显示，不报错 -->
  <div class="video">
    <iframe 
      src="https://www.youtube.com/embed/RQYzsYBYZt4" 
      allowfullscreen>
    </iframe>
  </div>
</div>

</body>
</html>
